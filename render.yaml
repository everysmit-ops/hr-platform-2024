services:
  - type: web
    name: hr-backend
    runtime: python
    repo: https://github.com/everysmit-ops/hr-platform-2024
    plan: free
    region: frankfurt
    branch: main
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DATABASE_URL
        fromDatabase:
          name: hr-database
          property: connectionString
